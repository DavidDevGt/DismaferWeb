name: 🐛 Bug Report
description: Reportar un problema o comportamiento inesperado
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar un bug. Completá el formulario con la mayor información posible.

  - type: textarea
    id: description
    attributes:
      label: Descripción del problema
      description: Describí qué está pasando y qué esperabas que pasara.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Pasos para reproducir el comportamiento.
      placeholder: |
        1. Ir a '...'
        2. Hacer click en '...'
        3. Ver el error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
      description: Qué debería pasar correctamente.
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Dispositivo
      options:
        - Desktop
        - Mobile (Android)
        - Mobile (iOS)
        - Tablet
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Navegador y versión
      placeholder: Chrome 124, Safari 17, Firefox 125...

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / video
      description: Si aplica, adjuntá capturas o video del problema.
