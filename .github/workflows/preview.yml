name: Preview — DismaferWeb

# Genera un reporte de preview en cada PR
# con resumen de build y artefactos descargables

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.head_ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  preview-report:
    name: 📋 Preview Report
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & collect stats
        id: build-stats
        run: |
          pnpm build 2>&1 | tee build.log
          PAGE_COUNT=$(find dist -name "*.html" | wc -l)
          DIST_SIZE=$(du -sh dist/ | cut -f1)
          echo "pages=$PAGE_COUNT" >> $GITHUB_OUTPUT
          echo "size=$DIST_SIZE" >> $GITHUB_OUTPUT

      - name: Run unit tests
        id: unit
        run: |
          pnpm test:ci 2>&1 | tee unit.log
          PASS=$(grep -oP '\d+ passed' unit.log | head -1 || echo "0 passed")
          echo "result=$PASS" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const pages = '${{ steps.build-stats.outputs.pages }}';
            const size = '${{ steps.build-stats.outputs.size }}';
            const unitResult = '${{ steps.unit.outputs.result }}';
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = `## 🚀 Preview — DismaferWeb \`${sha}\`

            | Métrica | Valor |
            |---------|-------|
            | 📄 Páginas generadas | **${pages}** |
            | 📦 Tamaño del build | **${size}** |
            | 🧪 Tests unitarios | **${unitResult}** |

            ### 📥 Artefactos disponibles
            Los siguientes artefactos se generan en cada CI run:
            - 📊 **Coverage Report** — reporte HTML de cobertura de código
            - 🎭 **Playwright Report** — reporte interactivo con screenshots y videos
            - 🎬 **Test Artifacts** — screenshots, videos y traces de tests E2E
            - 📋 **JUnit XML** — para integración con dashboards de calidad

            > 📎 [Ver todos los artefactos en GitHub Actions](${runUrl})

            ---
            *Generado automáticamente por el workflow de CI — DismaferWeb*`;

            // Buscar comentario previo del bot
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview — DismaferWeb')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
