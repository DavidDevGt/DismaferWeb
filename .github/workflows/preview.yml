name: Preview — DismaferWeb

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.head_ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  preview-report:
    name: 📋 Preview Report
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        id: build
        run: |
          pnpm build 2>&1 | tee build.log
          PAGE_COUNT=$(find dist -name "*.html" | wc -l)
          DIST_SIZE=$(du -sh dist/ | cut -f1)
          echo "pages=$PAGE_COUNT" >> $GITHUB_OUTPUT
          echo "size=$DIST_SIZE" >> $GITHUB_OUTPUT

      - name: Unit tests
        id: unit
        run: |
          pnpm test:ci 2>&1 | tee unit.log || true
          PASS=$(grep -oP '\d+ passed' unit.log | head -1 || echo "0 passed")
          FAIL=$(grep -oP '\d+ failed' unit.log | head -1 || echo "")
          echo "pass=$PASS" >> $GITHUB_OUTPUT
          echo "fail=$FAIL" >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const pages = '${{ steps.build.outputs.pages }}';
            const size = '${{ steps.build.outputs.size }}';
            const unitPass = '${{ steps.unit.outputs.pass }}';
            const unitFail = '${{ steps.unit.outputs.fail }}';
            const sha = context.sha.substring(0, 7);
            const branch = context.ref?.replace('refs/heads/', '') || context.head_ref;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactsUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/tree/ci/test-artifacts/latest`;

            const unitStatus = unitFail ? `⚠️ ${unitPass} / ${unitFail}` : `✅ ${unitPass}`;

            const body = [
              `## 🚀 Preview — DismaferWeb \`${sha}\``,
              '',
              `> Branch: \`${branch}\` → PR #${ context.issue.number }`,
              '',
              '### 📊 Métricas del build',
              '',
              '| Métrica | Valor |',
              '|---------|-------|',
              `| 📄 Páginas generadas | **${pages}** |`,
              `| 📦 Tamaño del build  | **${size}** |`,
              `| 🧪 Unit Tests        | **${unitStatus}** |`,
              '',
              '### 📥 Artefactos en el repo',
              '',
              `Los artefactos de esta rama se guardan en [\`ci/test-artifacts\`](${artifactsUrl}):`,
              '',
              '| Artefacto | Ubicación en el repo |',
              '|-----------|----------------------|',
              '| 📊 Coverage HTML | `ci/test-artifacts/latest/unit/coverage/index.html` |',
              '| 📋 JUnit Unit | `ci/test-artifacts/latest/unit/junit-unit.xml` |',
              '| 🎭 Playwright Report (Desktop) | `ci/test-artifacts/latest/e2e/desktop-chrome/` |',
              '| 📱 Playwright Report (Pixel 5) | `ci/test-artifacts/latest/e2e/pixel-5/` |',
              '| 🍎 Playwright Report (iPhone 12) | `ci/test-artifacts/latest/e2e/iphone-12/` |',
              '',
              '> Screenshots, videos y traces de Playwright disponibles en cada directorio `test-results/`',
              '',
              `---`,
              `*[Ver workflow completo](${runUrl}) · Generado automáticamente por CI — DismaferWeb*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview — DismaferWeb')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
