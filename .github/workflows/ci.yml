name: CI — DismaferWeb

on:
  push:
    branches:
      - main
      - 'claude/**'
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint (ESLint + Prettier check)
  # ─────────────────────────────────────────────
  lint:
    name: 🔎 Lint (ESLint + Prettier)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Prettier check
        run: pnpm format:check

  # ─────────────────────────────────────────────
  # JOB 2: Type Check
  # ─────────────────────────────────────────────
  typecheck:
    name: 🔍 Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Astro type check
        run: pnpm check

  # ─────────────────────────────────────────────
  # JOB 3: Unit Tests + Coverage
  # ─────────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests (Vitest)
    runs-on: ubuntu-latest
    outputs:
      tests-passed: ${{ steps.run-tests.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        id: run-tests
        run: |
          pnpm test:ci 2>&1 | tee unit-output.txt
          PASSED=$(grep -oP '\d+ passed' unit-output.txt | head -1 | grep -oP '\d+' || echo "0")
          echo "passed=$PASSED" >> $GITHUB_OUTPUT

      - name: Build summary
        if: always()
        run: |
          echo "## 🧪 Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          PASSED=$(grep -oP '\d+ passed' unit-output.txt | head -1 || echo "?")
          FAILED=$(grep -oP '\d+ failed' unit-output.txt | head -1 || echo "0 failed")
          echo "| ✅ Pasaron | **$PASSED** |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Fallaron | **$FAILED** |" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html-${{ github.run_number }}
          path: coverage/
          retention-days: 30

      - name: Upload JUnit unit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-unit-${{ github.run_number }}
          path: test-results/junit-unit.xml
          retention-days: 30

      - name: Coverage summary in PR
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

  # ─────────────────────────────────────────────
  # JOB 4: Build
  # ─────────────────────────────────────────────
  build:
    name: 🏗️ Build (Astro)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_number }}
          path: dist/
          retention-days: 7

      - name: Build summary
        run: |
          echo "## 🏗️ Build Output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          PAGE_COUNT=$(find dist -name "*.html" | wc -l)
          DIST_SIZE=$(du -sh dist/ | cut -f1)
          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📄 Páginas | **$PAGE_COUNT** |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Tamaño  | **$DIST_SIZE** |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 5: E2E Tests — matrix 3 viewports
  # ─────────────────────────────────────────────
  e2e:
    name: 🎭 E2E — ${{ matrix.project }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: 'Desktop Chrome'
            slug: desktop-chrome
            browser: chromium
          - project: 'Mobile Chrome (Pixel 5)'
            slug: pixel-5
            browser: chromium
          - project: 'Mobile Safari (iPhone 12)'
            slug: iphone-12
            browser: webkit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}

      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.run_number }}
          path: dist/

      - name: Run E2E — ${{ matrix.project }}
        run: pnpm test:e2e:ci --project="${{ matrix.project }}"
        env:
          CI: true

      - name: E2E summary
        if: always()
        run: |
          echo "## 🎭 E2E — ${{ matrix.project }}" >> $GITHUB_STEP_SUMMARY
          if [ -f "test-results/results.json" ]; then
            PASSED=$(node -e "const r=require('./test-results/results.json'); console.log(r.stats?.expected ?? '?')" 2>/dev/null || echo "?")
            FAILED=$(node -e "const r=require('./test-results/results.json'); console.log(r.stats?.unexpected ?? '?')" 2>/dev/null || echo "?")
            echo "| | |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Pasaron | **$PASSED** |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Fallaron | **$FAILED** |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.slug }}-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload screenshots + videos + traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts-${{ matrix.slug }}-${{ github.run_number }}
          path: test-results/
          retention-days: 14

      - name: Upload JUnit E2E
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-e2e-${{ matrix.slug }}-${{ github.run_number }}
          path: test-results/junit-e2e.xml
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 6: Guardar artefactos en rama ci/test-artifacts
  # ─────────────────────────────────────────────
  save-to-repo:
    name: 💾 Guardar artefactos en repo
    needs: [unit-tests, e2e]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout rama ci/test-artifacts
        run: |
          git fetch origin ci/test-artifacts 2>/dev/null || true
          if git rev-parse --verify origin/ci/test-artifacts >/dev/null 2>&1; then
            git branch ci/test-artifacts origin/ci/test-artifacts 2>/dev/null || \
              git branch -f ci/test-artifacts origin/ci/test-artifacts
            git worktree add /tmp/artifacts-branch ci/test-artifacts
          else
            git worktree add --orphan -b ci/test-artifacts /tmp/artifacts-branch
          fi

      - name: Preparar estructura de directorios
        run: |
          RUN="${{ github.run_number }}"
          DATE=$(date +%Y-%m-%d)
          SHA="${{ github.sha }}"

          mkdir -p /tmp/artifacts-branch/${DATE}/run-${RUN}/{unit/{coverage,junit},e2e/{desktop-chrome,pixel-5,iphone-12}/{playwright-report,test-results}}
          mkdir -p /tmp/artifacts-branch/latest/{unit/coverage,e2e/{desktop-chrome,pixel-5,iphone-12}}

          cat > /tmp/artifacts-branch/${DATE}/run-${RUN}/meta.json << EOF
          {
            "run": "$RUN",
            "date": "$DATE",
            "sha": "$SHA",
            "branch": "${{ github.ref_name }}",
            "actor": "${{ github.actor }}",
            "unitTestsResult": "${{ needs.unit-tests.result }}",
            "e2eResult": "${{ needs.e2e.result }}"
          }
          EOF

          echo "RUN=$RUN" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV

      - name: Descargar coverage
        uses: actions/download-artifact@v4
        if: needs.unit-tests.result == 'success'
        continue-on-error: true
        with:
          name: coverage-html-${{ github.run_number }}
          path: /tmp/dl-coverage

      - name: Descargar JUnit unit
        uses: actions/download-artifact@v4
        if: needs.unit-tests.result == 'success'
        continue-on-error: true
        with:
          name: junit-unit-${{ github.run_number }}
          path: /tmp/dl-junit-unit

      - name: Copiar unit artifacts
        if: always()
        run: |
          [ -d /tmp/dl-coverage ] && cp -r /tmp/dl-coverage/. /tmp/artifacts-branch/${DATE}/run-${RUN}/unit/coverage/ && cp -r /tmp/dl-coverage/. /tmp/artifacts-branch/latest/unit/coverage/ || true
          [ -f /tmp/dl-junit-unit/junit-unit.xml ] && cp /tmp/dl-junit-unit/junit-unit.xml /tmp/artifacts-branch/${DATE}/run-${RUN}/unit/junit/ && cp /tmp/dl-junit-unit/junit-unit.xml /tmp/artifacts-branch/latest/unit/ || true

      - name: Descargar E2E — Desktop Chrome
        uses: actions/download-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: playwright-report-desktop-chrome-${{ github.run_number }}
          path: /tmp/dl-rpt-desktop

      - name: Descargar artifacts — Desktop Chrome
        uses: actions/download-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: playwright-artifacts-desktop-chrome-${{ github.run_number }}
          path: /tmp/dl-art-desktop

      - name: Descargar E2E — Pixel 5
        uses: actions/download-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: playwright-report-pixel-5-${{ github.run_number }}
          path: /tmp/dl-rpt-pixel5

      - name: Descargar artifacts — Pixel 5
        uses: actions/download-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: playwright-artifacts-pixel-5-${{ github.run_number }}
          path: /tmp/dl-art-pixel5

      - name: Descargar E2E — iPhone 12
        uses: actions/download-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: playwright-report-iphone-12-${{ github.run_number }}
          path: /tmp/dl-rpt-iphone

      - name: Descargar artifacts — iPhone 12
        uses: actions/download-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: playwright-artifacts-iphone-12-${{ github.run_number }}
          path: /tmp/dl-art-iphone

      - name: Copiar E2E artifacts al repo
        if: always()
        run: |
          copy_if() { [ -d "$1" ] && cp -r "$1/." "$2/" || true; }
          copy_if /tmp/dl-rpt-desktop  /tmp/artifacts-branch/${DATE}/run-${RUN}/e2e/desktop-chrome/playwright-report
          copy_if /tmp/dl-art-desktop  /tmp/artifacts-branch/${DATE}/run-${RUN}/e2e/desktop-chrome/test-results
          copy_if /tmp/dl-rpt-desktop  /tmp/artifacts-branch/latest/e2e/desktop-chrome
          copy_if /tmp/dl-rpt-pixel5   /tmp/artifacts-branch/${DATE}/run-${RUN}/e2e/pixel-5/playwright-report
          copy_if /tmp/dl-art-pixel5   /tmp/artifacts-branch/${DATE}/run-${RUN}/e2e/pixel-5/test-results
          copy_if /tmp/dl-rpt-pixel5   /tmp/artifacts-branch/latest/e2e/pixel-5
          copy_if /tmp/dl-rpt-iphone   /tmp/artifacts-branch/${DATE}/run-${RUN}/e2e/iphone-12/playwright-report
          copy_if /tmp/dl-art-iphone   /tmp/artifacts-branch/${DATE}/run-${RUN}/e2e/iphone-12/test-results
          copy_if /tmp/dl-rpt-iphone   /tmp/artifacts-branch/latest/e2e/iphone-12

      - name: Commit y push al repo
        run: |
          cd /tmp/artifacts-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Sin artefactos nuevos"
          else
            git commit -m "ci: run #${{ github.run_number }} — ${{ github.ref_name }}"
            git push origin ci/test-artifacts
            echo "✅ Artefactos en ci/test-artifacts" >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────
  # JOB 7: Quality Gate
  # ─────────────────────────────────────────────
  quality-gate:
    name: ✅ Quality Gate
    needs: [lint, typecheck, unit-tests, build, e2e, save-to-repo]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Evaluación final
        run: |
          echo "## ✅ Quality Gate — DismaferWeb" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔎 Lint          | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Type Check    | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Unit Tests    | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build         | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 E2E           | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 💾 Artifacts     | ${{ needs.save-to-repo.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 [Ver artefactos en ci/test-artifacts](../../tree/ci/test-artifacts/latest)" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.typecheck.result }}" != "success" || \
                "${{ needs.unit-tests.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" || \
                "${{ needs.e2e.result }}" != "success" ]]; then
            echo "❌ **Quality Gate FAILED**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ **Quality Gate PASSED**" >> $GITHUB_STEP_SUMMARY
