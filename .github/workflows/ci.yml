name: CI — DismaferWeb

on:
  push:
    branches:
      - main
      - 'claude/**'
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Type Check
  # ─────────────────────────────────────────────
  typecheck:
    name: 🔍 Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Astro type check
        run: pnpm check

  # ─────────────────────────────────────────────
  # JOB 2: Unit Tests + Coverage
  # ─────────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm test:ci

      - name: Upload coverage report (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.run_number }}
          path: coverage/
          retention-days: 30

      - name: Upload JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-unit-${{ github.run_number }}
          path: test-results/junit-unit.xml
          retention-days: 30

      - name: Coverage summary in PR
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

  # ─────────────────────────────────────────────
  # JOB 3: Build
  # ─────────────────────────────────────────────
  build:
    name: 🏗️ Build (Astro)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_number }}
          path: dist/
          retention-days: 7

      - name: Report page count
        run: |
          echo "## 🏗️ Build Output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          PAGE_COUNT=$(find dist -name "*.html" | wc -l)
          echo "- **Páginas generadas:** $PAGE_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Tamaño total:** $(du -sh dist/ | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Ver todas las páginas</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          find dist -name "*.html" | sed 's|dist||g' | sed 's|/index.html||g' | sort | while read page; do
            echo "- \`${page:-/}\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 4: E2E Tests (Playwright)
  # ─────────────────────────────────────────────
  e2e:
    name: 🎭 E2E Tests (Playwright)
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ['Desktop Chrome', 'Mobile Chrome (Pixel 5)', 'Mobile Safari (iPhone 12)']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.run_number }}
          path: dist/

      - name: Run E2E tests — ${{ matrix.project }}
        run: pnpm test:e2e:ci --project="${{ matrix.project }}"
        env:
          CI: true

      - name: Slugify project name
        if: always()
        id: slug
        run: |
          SLUG=$(echo "${{ matrix.project }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-\|-$//g')
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ steps.slug.outputs.slug }}-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload screenshots / videos / traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts-${{ steps.slug.outputs.slug }}-${{ github.run_number }}
          path: test-results/
          retention-days: 14

      - name: Upload JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-e2e-${{ steps.slug.outputs.slug }}-${{ github.run_number }}
          path: test-results/junit-e2e.xml
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 5: Quality Gate (resumen final)
  # ─────────────────────────────────────────────
  quality-gate:
    name: ✅ Quality Gate
    needs: [typecheck, unit-tests, build, e2e]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "## ✅ Quality Gate — DismaferWeb" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Type Check | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build      | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 E2E Tests  | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.typecheck.result }}" != "success" || \
                "${{ needs.unit-tests.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" || \
                "${{ needs.e2e.result }}" != "success" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Quality Gate FAILED** — uno o más checks fallaron." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Quality Gate PASSED** — todos los checks superados." >> $GITHUB_STEP_SUMMARY
